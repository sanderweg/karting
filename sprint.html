<!DOCTYPE html>
<html>
<head>
<title>Sprint Dashboard</title>
<script src="code.js"></script>
<style>
body{background:#111;color:white;text-align:center;font-family:Arial;}
.box{margin:15px;padding:20px;background:#222;border-radius:10px;font-size:28px;}
</style>
</head>

<body>

<h1>SPRINT</h1>

<div class="box">Positie: <span id="pos"></span></div>
<div class="box">Voor: <span id="front"></span></div>
<div class="box">Achter: <span id="behind"></span></div>
<div class="box">Tijd: <span id="time"></span></div>

<script>
let kart = new URLSearchParams(window.location.search).get("kart")

async function update(){

let rows = await getRows()
if(!rows) return

let myIndex = -1

rows.forEach((r,i)=>{
    let k = r.children[1]?.innerText.trim()
    if(k == kart) myIndex = i
})

if(myIndex === -1) return

let myRow = rows[myIndex]
let front = rows[myIndex-1]
let back = rows[myIndex+1]

document.getElementById("pos").innerText = myIndex+1
document.getElementById("front").innerText = front ? front.children[1].innerText : "-"
document.getElementById("behind").innerText = back ? back.children[1].innerText : "-"
document.getElementById("time").innerText = document.querySelector(".chrono")?.innerText || "-"

}

setInterval(update,2000)
</script>

</body>
</html>
