<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sprint Dashboard</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
font-size:40px;
padding:20px;
}

input{
font-size:28px;
padding:8px;
width:120px;
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.box{
background:#1a1a1a;
padding:35px;
border-radius:15px;
font-size:40px;
}

.big{
font-size:80px;
}

</style>

</head>

<body>

<header>Sprint Race Dashboard</header>

Kartnummer  
<br>
<input id="kartNumber" placeholder="12">

<div class="grid">

<div class="box big" id="position">
Pos --
</div>

<div class="box" id="ahead">
Ahead --
</div>

<div class="box" id="behind">
Behind --
</div>

<div class="box big" id="timeLeft">
Time --
</div>

</div>

<iframe
id="timing"
src="https://www.apex-timing.com/live-timing/kartbaanoldenzaal/?fullscreen=true#live"
style="display:none">
</iframe>

<script>

const params = new URLSearchParams(window.location.search);
const kartFromURL = params.get("kart");

if(kartFromURL){
document.getElementById("kartNumber").value = kartFromURL;
}

function update(){

try{

let iframe=document.getElementById("timing")
let doc=iframe.contentWindow.document

let rows=doc.querySelectorAll("table tbody tr")
let kart=document.getElementById("kartNumber").value

rows.forEach((r,i)=>{

let cols=r.querySelectorAll("td")

if(cols.length>7 && cols[1].innerText==kart){

// positie
position.innerText="P"+(i+1)

// gap naar voorganger
ahead.innerText="Ahead "+cols[4].innerText

// achterligger
if(rows[i+1]){

let next=rows[i+1].querySelectorAll("td")
behind.innerText="Behind "+next[4].innerText

}

}

})

// resterende tijd
let headerTimer=doc.querySelector(".session-info")

if(headerTimer){

timeLeft.innerText=headerTimer.innerText

}

}catch(e){}

}

setInterval(update,2000)

</script>

</body>
</html>
