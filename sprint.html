<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sprint Dashboard</title>

<style>
body {
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
}

#overlay {
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:15px;
  width:280px;
}

#overlay h1 {
  margin:0 0 10px 0;
}

select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#111;
  color:white;
  border:1px solid #444;
}

.card {
  background:#111;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  font-size:18px;
}

.big {
  font-size:28px;
  font-weight:bold;
}

iframe {
  width:100%;
  height:100vh;
  border:0;
}
</style>
</head>

<body>

<div id="overlay">
  <h1>Sprint</h1>

  <select id="kart">
    <option>5</option>
    <option>4</option>
    <option>18</option>
    <option>13</option>
    <option>11</option>
    <option>1</option>
  </select>

  <div class="card">Positie: <span class="big">👀</span></div>
  <div class="card">Voor: <span>👀</span></div>
  <div class="card">Achter: <span>👀</span></div>
  <div class="card">Tijd: <span>👀</span></div>
</div>

<iframe src="https://www.apex-timing.com/live-timing/kartbaanoldenzaal/"></iframe>

</body>
</html>
