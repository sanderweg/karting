<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.9);
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    #status {
      font-size: 18px;
      font-weight: bold;
    }

    #frame {
      width: 100%;
      height: 100vh;
      border: 0;
      margin-top: 52px;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div id="status">Test loopt...</div>
  </div>

  <iframe
    id="frame"
    src="https://www.apex-timing.com/live-timing/kartbaanoldenzaal/"
  ></iframe>

  <script>
    const statusEl = document.getElementById("status");
    const frame = document.getElementById("frame");

    function testAccess() {
      try {
        const doc = frame.contentWindow.document;
        const rows = doc.querySelectorAll("table tbody tr");
        statusEl.textContent = "Toegang gelukt. Rijen gevonden: " + rows.length;
        console.log("Rows:", rows);
      } catch (e) {
        statusEl.textContent = "Iframe zichtbaar, maar JS-toegang geblokkeerd door cross-origin.";
        console.error(e);
      }
    }

    frame.addEventListener("load", () => {
      setTimeout(testAccess, 3000);
    });
  </script>
</body>
</html>
