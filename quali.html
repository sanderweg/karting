<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quali</title>

<script src="./firebase-config.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const config = window.RACE_FIREBASE_CONFIG;
const app = initializeApp(config);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "test";
const isPit = params.get("pit") === "1";

const dataRef = ref(db, "rooms/" + room);

window.send = (msg) => {
  set(dataRef, { message: msg, time: Date.now() });
};

onValue(dataRef, (snap) => {
  const data = snap.val();
  if(data){
    document.getElementById("main").innerText = data.message;
  }
});

window.onload = () => {
  document.getElementById("mode").innerText = isPit ? "PITWALL" : "DRIVER";
};
</script>

<style>
body{
  margin:0;
  color:white;
  font-family:Arial;
  background:url("team-bg.png") center/cover no-repeat;
}

.overlay{
  background:rgba(0,0,0,0.7);
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#main{
  font-size:80px;
  font-weight:bold;
}

button{
  padding:15px;
  margin:5px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="overlay">

<img src="team-logo.png" width="120">

<h3 id="mode"></h3>

<div id="main">READY</div>

<div id="pitControls"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const isPit = params.get("pit") === "1";

if(isPit){
  document.getElementById("pitControls").innerHTML = `
    <button onclick="send('PUSH')">PUSH</button>
    <button onclick="send('BOX')">BOX</button>
    <button onclick="send('SAVE')">SAVE</button>
    <button onclick="send('COOL')">COOL</button>
    <button onclick="send('ATTACK')">ATTACK</button>
  `;
}
</script>

</body>
</html>
