<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kart Race Engineer</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#111;
padding:15px;
font-size:28px;
}

.controls{
margin:10px;
}

input{
font-size:28px;
padding:8px;
width:120px;
text-align:center;
}

button{
font-size:20px;
padding:8px 15px;
margin-left:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.box{
background:#1a1a1a;
padding:20px;
border-radius:10px;
font-size:32px;
}

.big{
font-size:70px;
}

.green{color:#00ff9c}
.red{color:#ff4d4d}

canvas{
background:#111;
border-radius:10px;
margin:10px;
}

.pitwall .box{
font-size:55px;
}

.pitwall .big{
font-size:120px;
}

</style>

</head>

<body>

<header>Kart Race Engineer</header>

<div class="controls">
Kartnummer
<input id="kartNumber" placeholder="12">
<button onclick="toggleMode()">Pitwall mode</button>
</div>

<div class="grid">

<div class="box big" id="pos">--</div>
<div class="box" id="ahead">--</div>

<div class="box" id="behind">--</div>
<div class="box" id="last">--</div>

<div class="box" id="best">--</div>
<div class="box" id="advice">--</div>

</div>

<canvas id="gapChart" width="350" height="200"></canvas>

<iframe
id="timing"
src="https://www.apex-timing.com/live-timing/kartbaanoldenzaal/?fullscreen=true#live"
style="display:none"></iframe>

<script>

let prevAhead=null
let prevBehind=null
let gaps=[]

function toggleMode(){
document.body.classList.toggle("pitwall")
}

function drawChart(){

let c=document.getElementById("gapChart")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,c.width,c.height)

ctx.beginPath()

gaps.forEach((g,i)=>{

let x=i*(c.width/20)
let y=c.height-(g*20)

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.strokeStyle="#00ff9c"
ctx.stroke()

}

function update(){

try{

let iframe=document.getElementById("timing")
let doc=iframe.contentWindow.document

let rows=doc.querySelectorAll("table tbody tr")

let kart=document.getElementById("kartNumber").value

rows.forEach((r,i)=>{

let cols=r.querySelectorAll("td")

if(cols.length>7 && cols[1].innerText==kart){

let position=i+1

let interval=parseFloat(cols[4].innerText)
let last=cols[6].innerText
let best=cols[7].innerText

pos.innerText="P"+position
ahead.innerText="Ahead "+interval
last.innerText="Last "+last
best.innerText="Best "+best

let behindGap=0

if(rows[i+1]){

let next=rows[i+1].querySelectorAll("td")
behindGap=parseFloat(next[4].innerText)

}

behind.innerText="Behind "+behindGap

let advice="Hold pace"

if(prevAhead && interval < prevAhead)
advice="Push 🟢"

if(prevBehind && behindGap < prevBehind)
advice="Defend 🔴"

adviceEl.innerText=advice

prevAhead=interval
prevBehind=behindGap

gaps.push(interval)

if(gaps.length>20) gaps.shift()

drawChart()

}

})

}catch(e){}

}

setInterval(update,2000)

</script>

</body>
</html>
