<!DOCTYPE html>
<html>
<head>
<title>Endurance Dashboard</title>
<script src="code.js"></script>
<style>
body{background:#111;color:white;text-align:center;font-family:Arial;}
.box{margin:15px;padding:20px;background:#222;border-radius:10px;font-size:26px;}
</style>
</head>

<body>

<h1>ENDURANCE</h1>

<div class="box">Positie: <span id="pos"></span></div>
<div class="box">Voor: <span id="front"></span></div>
<div class="box">Pitstops voor: <span id="frontPit"></span></div>
<div class="box">Achter: <span id="behind"></span></div>
<div class="box">Pitstops achter: <span id="behindPit"></span></div>
<div class="box">Tijd: <span id="time"></span></div>

<script>
let kart = new URLSearchParams(window.location.search).get("kart")

async function update(){

let rows = await getRows()
if(!rows) return

let i = rows.findIndex(r => r.children[1]?.innerText.trim() == kart)
if(i === -1) return

let front = rows[i-1]
let back = rows[i+1]

document.getElementById("pos").innerText = i+1
document.getElementById("front").innerText = front?.children[1]?.innerText || "-"
document.getElementById("behind").innerText = back?.children[1]?.innerText || "-"
document.getElementById("frontPit").innerText = front?.children[5]?.innerText || "-"
document.getElementById("behindPit").innerText = back?.children[5]?.innerText || "-"
document.getElementById("time").innerText = document.querySelector(".chrono")?.innerText || "-"

}

setInterval(update,2000)
</script>

</body>
</html>
