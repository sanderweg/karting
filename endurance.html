<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Endurance</title>
<script src="core.js"></script>

<style>
body{background:#000;color:white;text-align:center;font-family:Arial;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:20px;}
.box{background:#1a1a1a;padding:25px;border-radius:10px;font-size:30px;}
.big{font-size:70px;}
</style>
</head>

<body>

<h1>Endurance</h1>

<div class="grid">

<div class="box big" id="pos">P--</div>
<div class="box big" id="time">--</div>

<div class="box" id="ahead">--</div>
<div class="box" id="aheadStops">Stops --</div>

<div class="box" id="behind">--</div>
<div class="box" id="behindStops">Stops --</div>

</div>

<script>

let kart = new URLSearchParams(window.location.search).get("kart")

async function update(){

let raw = await getData()
if(!raw) return

let data = parseData(raw)
let race = getMyData(data, kart)

if(!race) return

pos.innerText = "P" + race.me.pos
time.innerText = data.racetime + "s"

ahead.innerText = race.ahead
? "Ahead: Kart " + race.ahead.kart
: "Leader"

behind.innerText = race.behind
? "Behind: Kart " + race.behind.kart
: "Last"

// pitstops (placeholder)
aheadStops.innerText = "Stops: ?"
behindStops.innerText = "Stops: ?"

}

setInterval(update,2000)

</script>

</body>
</html>
