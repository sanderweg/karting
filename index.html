<script src="core.js"></script>

<select id="kartSelect"></select>

<script>
async function loadKarts() {

  let raw = await getData()
  let rows = getRows(raw)

  let select = document.getElementById("kartSelect")
  select.innerHTML = ""

  if (rows.length === 0) {
    select.innerHTML = "<option>Geen karts gevonden</option>"
    return
  }

  rows.forEach(r => {
    let opt = document.createElement("option")
    opt.value = r.kart
    opt.text = "Kart " + r.kart + " (" + r.name + ")"
    select.appendChild(opt)
  })
}

loadKarts()
</script>
