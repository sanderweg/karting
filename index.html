<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Dashboard</title>
  <style>
    body {
      margin:0;
      font-family: Arial;
      background: url("team-bg.png") center/cover no-repeat;
      color:white;
      text-align:center;
    }
    .box {
      background: rgba(0,0,0,0.7);
      padding:20px;
      margin-top:100px;
    }
    input, button {
      padding:10px;
      margin:10px;
      font-size:18px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>TEAM DASHBOARD</h1>

  <input id="room" placeholder="Team naam">

  <br>

  <button onclick="openPage('quali', false)">Driver Quali</button>
  <button onclick="openPage('quali', true)">Pitwall Quali</button>

  <br>

  <button onclick="openPage('sprint', false)">Driver Sprint</button>
  <button onclick="openPage('sprint', true)">Pitwall Sprint</button>

</div>

<script>
function openPage(type, pit){
  const room = document.getElementById("room").value || "test";
  let url = type + ".html?room=" + room;
  if(pit) url += "&pit=1";
  window.location.href = url;
}
</script>

</body>
</html>
