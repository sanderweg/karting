<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Race dashboard</title><style>body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#132a62 0%,#07142f 38%,#020713 100%);color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px}.wrap{width:min(760px,100%);background:rgba(18,30,64,.74);border:1px solid rgba(255,255,255,.09);border-radius:28px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}h1{margin:0 0 8px;font-size:36px}p{color:#a9bbdf}.row{display:grid;gap:12px;margin-top:18px}input{padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:#091127;color:#fff;font-size:18px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}a{display:block;text-align:center;padding:18px;border-radius:18px;background:linear-gradient(180deg,#2b6fff,#1749c8);color:#fff;text-decoration:none;font-weight:800}@media(max-width:720px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>Race dashboard</h1><p>Kies een room en open direct de fullscreen driver-view of de pitwall.</p><div class="row"><input id="room" placeholder="oldenzaal" value="oldenzaal"></div><div class="grid"><a href="#" onclick="go('quali.html');return false;">Quali</a><a href="#" onclick="go('sprint.html');return false;">Sprint</a><a href="#" onclick="go('endurance.html');return false;">Endurance</a></div></div><script>function go(page){const room=document.getElementById('room').value.trim()||'oldenzaal';location.href=page+'?room='+encodeURIComponent(room);} </script></body></html>
