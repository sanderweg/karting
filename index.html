<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kart Dashboard</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
}

h1{margin-top:40px;}

.menu{
display:flex;
flex-direction:column;
gap:20px;
margin-top:50px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:30px;
border-radius:15px;
font-size:28px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#333;
transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Kart Dashboard V2</h1>

<div class="menu">

<div class="card" onclick="go('quali.html')">🏁 Qualifying</div>
<div class="card" onclick="go('sprint.html')">🏎 Sprint</div>
<div class="card" onclick="go('endurance.html')">⛽ Endurance</div>

</div>

<script>
function go(page){

let kart = prompt("Voer kart nummer in:")

if(kart){
window.location = page + "?kart=" + kart
}

}
</script>

</body>
</html>
